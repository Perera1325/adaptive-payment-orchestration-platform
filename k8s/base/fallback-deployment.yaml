apiVersion: apps/v1
kind: Deployment
metadata:
  name: fallback-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fallback-service
  template:
    metadata:
      labels:
        app: fallback-service
    spec:
      containers:
      - name: fallback-service
        image: fallback-service
        imagePullPolicy: Never
        ports:
        - containerPort: 3001